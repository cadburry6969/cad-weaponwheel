<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weapon Wheel</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="weapon-wheel-container" class="hidden">
        <div id="weapon-wheel">
            <div id="wheel-highlight"></div>
            <div id="icons-container"></div>
        </div>

        <div id="center-display">
            <div id="selected-weapon-name">PISTOL</div>
            <div id="selected-icon">
                <img id="main-icon" src="https://docs.fivem.net/weapons/WEAPON_PISTOL.png" alt="Selected">
            </div>
            <div id="sub-weapon-dots"></div>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>

</html>
